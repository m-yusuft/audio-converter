<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AudioConvert</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #020202; color: #fff; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .btn-glass { background: rgba(255, 255, 255, 0.08); border: 1px solid rgba(255, 255, 255, 0.15); transition: 0.3s; }
        .btn-glass:hover { background: rgba(255, 255, 255, 0.2); }
        .btn-glass:disabled { opacity: 0.3; cursor: not-allowed; }
        .list-container { max-height: 50vh; overflow-y: auto; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 10px; }
        
        #info-panel { 
            transition: opacity 0.4s ease, transform 0.4s ease; 
            opacity: 0; transform: translateY(-10px); pointer-events: none;
        }
        #info-panel.show { opacity: 1; transform: translateY(0); pointer-events: auto; }
    </style>
</head>
<body class="min-h-screen flex flex-col p-4 md:p-8 overflow-x-hidden">

    <div id="bg-container" class="fixed inset-0 bg-cover bg-center -z-10 brightness-[0.3] transition-all duration-1000"></div>

    <button onclick="toggleInfo()" class="fixed top-4 right-4 md:top-6 md:right-6 glass px-4 py-2 md:px-6 md:py-3 rounded-full text-xs md:text-sm font-bold z-50 hover:scale-105 transition-transform">Burası neresi?</button>
    <div id="info-panel" class="fixed top-16 right-4 md:top-20 md:right-6 w-[calc(100vw-32px)] md:w-96 glass p-6 md:p-8 rounded-3xl z-40 hidden max-h-[70vh] overflow-y-auto shadow-2xl">
        <h2 id="info-title" class="text-xl md:text-2xl font-bold mb-4 text-blue-400"></h2>
        <p id="info-desc" class="text-xs md:text-sm text-zinc-300 leading-relaxed text-justify"></p>
    </div>

    <main class="flex-1 max-w-2xl mx-auto w-full flex flex-col mt-12 md:mt-0">
        <h1 class="text-2xl md:text-3xl font-bold text-center mb-6 tracking-tight">Ses Dönüştürücü</h1>

        <div id="drop-zone" class="glass p-6 rounded-3xl border-2 border-dashed border-white/10 text-center cursor-pointer mb-4 hover:border-blue-500/50 transition-all hover:bg-white/5 shrink-0">
            <p class="text-xs md:text-sm px-4">Ses dosyalarını buraya sürükleyin veya tıklayın</p>
            <input type="file" id="file-input" multiple accept="audio/*" class="hidden">
        </div>

        <div id="file-count" class="text-[10px] md:text-xs text-zinc-500 mb-2 px-2"></div>
        <div id="file-list" class="list-container space-y-3 mb-4 flex-1"></div>

        <div id="controls" class="grid grid-cols-3 gap-2 md:gap-3 hidden shrink-0 pt-4 border-t border-white/10">
            <button onclick="convertAll()" class="btn-glass py-2 md:py-3 rounded-xl text-[10px] md:text-sm font-bold">Tümünü Çevir</button>
            <button id="download-all-btn" onclick="downloadAll()" class="btn-glass py-2 md:py-3 rounded-xl text-[10px] md:text-sm font-bold" disabled>Tümünü İndir</button>
            <button onclick="clearAll()" class="btn-glass py-2 md:py-3 rounded-xl text-[10px] md:text-sm font-bold text-red-400 border-red-900/50">Tümünü Sil</button>
        </div>
    </main>

    <footer class="text-center py-6 mt-auto opacity-70">
        <div class="flex items-center justify-center gap-2 text-xs md:text-sm">
            <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24"><path d="M12 .297c-6.63 0-12 5.373-12 12 0 5.303 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61C4.422 18.07 3.633 17.7 3.633 17.7c-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 22.092 24 17.592 24 12.297c0-6.627-5.373-12-12-12"/></svg>
            <span>GitHub'ın gücüyle Yusuf tarafından yapıldı</span>
        </div>
    </footer>

    <script id="worker-script" type="text/javascript-worker">
        importScripts('https://cdnjs.cloudflare.com/ajax/libs/lamejs/1.2.1/lame.all.min.js');
        self.onmessage = function(e) {
            const { pcmData, id, sampleRate } = e.data;
            try {
                const mp3Encoder = new lamejs.Mp3Encoder(1, sampleRate, 128);
                const mp3Data = [];
                const sampleBlockSize = 1152;
                for (let i = 0; i < pcmData.length; i += sampleBlockSize) {
                    const sampleChunk = pcmData.subarray(i, i + sampleBlockSize);
                    const mp3buf = mp3Encoder.encodeBuffer(sampleChunk);
                    if (mp3buf.length > 0) mp3Data.push(mp3buf);
                }
                const mp3buf2 = mp3Encoder.flush();
                if (mp3buf2.length > 0) mp3Data.push(mp3buf2);
                self.postMessage({ id, blob: new Blob(mp3Data, {type: 'audio/mp3'}), status: 'Hazır', progress: 100 });
            } catch(e) {
                self.postMessage({ id, status: 'Hata', progress: 0 });
            }
        };
    </script>

    <script>
        const data = [
            { url: 'https://rentalia.com.tr/media/adana-blog/simit-selalesi-adana-gezilecek-yerler.jpg', title: 'Simit Şelalesi', desc: 'Adana’nın Aladağ ilçesinde yer alan, el değmemiş doğası ve turkuaz sularıyla bilinen saklı bir cennettir.' },
            { url: 'https://rentalia.com.tr/media/adana-blog/dagilcak-mesire-alani-adana-gezilecek-yerler.jpg', title: 'Dağılcak Mesire Alanı', desc: 'Adana’nın Kozan ilçesinde yer alan, doğası ve buz gibi akan suyuyla bilinen popüler bir dinlenme alanıdır.' },
            { url: 'https://rentalia.com.tr/media/adana-blog/akyatan-golu-milli-parki-adana.jpg', title: 'Akyatan Gölü', desc: 'Türkiye’nin en büyük lagün gölüdür ve uluslararası öneme sahip bir sulak alandır.' },
            { url: 'https://rentalia.com.tr/media/adana-blog/kup-selaleleri-adana-gezilecek-yerler.jpg', title: 'Küp Şelaleleri', desc: 'Adana’nın Aladağ ilçesinde bulunan ve yaklaşık 10 farklı şelaleden oluşan doğal bir güzelliktir.' },
            { url: 'https://rentalia.com.tr/media/adana-blog/dokuzoluk-kanyonu-adana-gezilecek-yerler.jpg', title: 'Dokuzoluk Kanyonu', desc: 'Adana’nın Karaisalı ilçesinde, Merkezboztahta Köyü sınırlarında yer alan bir doğa harikasıdır.' },
            { url: 'https://rentalia.com.tr/media/adana-blog/korkun-kanyonu-adana-gezilecek-yerler.jpg', title: 'Körkün Kanyonu', desc: 'Adana’nın Karaisalı ilçesinde yer alan Körkün Kanyonu, buz gibi suyu ve el değmemiş doğasıyla bilinen saklı bir cennettir.' },
            { url: 'https://rentalia.com.tr/media/adana-blog/sar-oren-yeri-adana-gezilecek-yerler.jpg', title: 'Şar Antik Kenti', desc: 'Adana’nın en kuzey ucunda, Tufanbeyli ilçesinde yer alan, Hititlerden Roma ve Bizans dönemlerine kadar kesintisiz yerleşim görmüş önemli bir merkezdir.' },
            { url: 'https://rentalia.com.tr/media/adana-blog/misis-mozaik-muzesi-adana-gezilecek-yerler.jpg', title: 'Misis Antik Kenti', desc: 'Adana’nın Yüreğir ilçesinde, Ceyhan Nehri kıyısında yer alan ve kazıların hala devam ettiği tarihi bir yerleşimdir.' },
            { url: 'https://rentalia.com.tr/media/adana-blog/magarsus-antik-kenti-adana-gezilecek-yerler.jpg', title: 'Magarsus Antik Kenti', desc: 'Adana’nın Karataş ilçesinde denize nazır bir yamaçta yükselen, Kilikya bölgesinin en köklü yerleşimlerinden biridir.' },
            { url: 'https://rentalia.com.tr/media/adana-blog/feke-kalesi-adana-gezilecek-yerler.jpg', title: 'Feke Kalesi', desc: 'Adana’nın Feke ilçesinde yer alan, İpek Yolu’nu kontrol etmek amacıyla sarp kayalıklara inşa edilmiş tarihi bir yapıdır.' },
            { url: 'https://rentalia.com.tr/media/adana-blog/catalan-koprusu-adana-gezilecek-yerler.jpg', title: 'Çatalan Köprüsü', desc: 'Adana’nın kuzeyinde yer alan Çatalan Köprüsü, Seyhan Baraj Gölü üzerinde kurulu bir simge yapıdır.' },
            { url: 'https://trthaberstatic.cdn.wp.trt.com.tr/resimler/2210000/adana-sabanci-merkez-cami-aa-2211520.jpg', title: 'Sabancı Merkez Camii', desc: 'Adana’nın simgesi haline gelmiş, Türkiye ve Orta Doğu’nun en büyük camilerinden biridir.' },
            { url: 'https://rentalia.com.tr/media/adana-blog/buyuksaat-adana-gezilecek-yerler.jpg', title: 'Büyüksaat', desc: 'Adana’nın simgesi olan Büyük Saat Kulesi, 32 metrelik uzunluğuyla Türkiye’nin en yüksek saat kulesidir.' },
            { url: 'https://rentalia.com.tr/media/adana-blog/yilankale-adana-gezilecek-yerler.jpg', title: 'Yılankale', desc: 'Adana’nın Ceyhan ilçesinde, Ceyhan Ovası’na hakim sarp kayalık bir tepe üzerinde yer alan Orta Çağ kalesidir.' },
            { url: 'https://rentalia.com.tr/media/adana-blog/varda-koprusu-adana-gezilecek-yerler.jpg', title: 'Varda Köprüsü', desc: 'Adana’nın Karaisalı ilçesinde yer alan, 1912 yılında tamamlanmış devasa bir demiryolu viyadüğüdür.' },
            { url: 'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTE1RO4evkCeGeAHj_4wUPHiujj76UKnO96EQ&s', title: 'Taş Köprü', desc: 'Adana Taşköprü, Seyhan Nehri üzerinde yer alan ve dünyanın halen kullanılan en eski köprüsü olarak kabul edilir.' },
        ];
        function changeBg() {
            const loc = data[Math.floor(Math.random() * data.length)];
            document.getElementById('bg-container').style.backgroundImage = `url('${loc.url}')`;
            document.getElementById('info-title').innerText = loc.title;
            document.getElementById('info-desc').innerText = loc.desc;
        }
        changeBg();
        
        function toggleInfo() {
            const panel = document.getElementById('info-panel');
            if (panel.classList.contains('hidden')) {
                panel.classList.remove('hidden');
                setTimeout(() => panel.classList.add('show'), 10);
            } else {
                panel.classList.remove('show');
                setTimeout(() => panel.classList.add('hidden'), 400);
            }
        }

        let worker = createWorker();
        function createWorker() {
            const workerBlob = new Blob([document.getElementById('worker-script').textContent], {type: 'text/javascript'});
            return new Worker(URL.createObjectURL(workerBlob));
        }

        let queue = [];
        let isProcessing = false;
        let activeItemId = null;

        worker.onmessage = (e) => {
            const item = queue.find(i => i.id === e.data.id);
            if(item) { 
                item.blob = e.data.blob; 
                item.status = e.data.status; 
                item.progress = e.data.progress; 
                render();
                processNext();
            }
        };

        async function processNext() {
            const nextItem = queue.find(i => i.status === 'Sırada');
            if (!nextItem) {
                isProcessing = false;
                activeItemId = null;
                render();
                return;
            }
            isProcessing = true;
            activeItemId = nextItem.id;
            await processFile(nextItem);
        }

        async function processFile(item) {
            try {
                item.status = 'İşleniyor'; item.progress = 30; render();
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const arrayBuffer = await item.file.arrayBuffer();
                const audioBuffer = await audioCtx.decodeAudioData(arrayBuffer);
                
                const float32Data = audioBuffer.getChannelData(0);
                const int16Data = new Int16Array(float32Data.length);
                for (let i = 0; i < float32Data.length; i++) {
                    int16Data[i] = Math.max(-32768, Math.min(32767, float32Data[i] * 32767));
                }
                
                item.progress = 70; render();
                worker.postMessage({ id: item.id, pcmData: int16Data, sampleRate: audioBuffer.sampleRate });
            } catch(e) {
                item.status = 'Hata'; item.progress = 0; render();
                processNext();
            }
        }

        function render() {
            const list = document.getElementById('file-list');
            const fileCount = document.getElementById('file-count');
            const downloadAllBtn = document.getElementById('download-all-btn');
            document.getElementById('controls').classList.toggle('hidden', queue.length === 0);
            fileCount.innerText = queue.length > 0 ? `${queue.length} dosya yüklendi` : '';
            const allReady = queue.length > 0 && queue.every(i => i.status === 'Hazır');
            downloadAllBtn.disabled = !allReady;

            list.innerHTML = queue.map(i => `
                <div class="glass p-3 rounded-2xl animate-in fade-in zoom-in duration-300">
                    <div class="flex justify-between items-center mb-1">
                        <span class="text-[10px] md:text-xs truncate max-w-[100px] md:max-w-[200px]">${i.file.name}</span>
                        <div class="flex gap-1 shrink-0">
                            ${i.status === 'Bekliyor' ? `<button onclick="addToQueue(${i.id})" class="btn-glass px-2 py-1 rounded-md text-[9px] md:text-[10px]">Çevir</button>` : i.status === 'Hazır' ? `<button onclick="download(${i.id})" class="btn-glass px-2 py-1 rounded-md text-[9px] md:text-[10px] text-emerald-400">İndir</button>` : `<span class="text-[9px] md:text-[10px] ${i.status === 'Hata' ? 'text-red-500' : 'text-yellow-500'}">${i.status}</span>`}
                            <button onclick="remove(${i.id})" class="btn-glass px-2 py-1 rounded-md text-[9px] md:text-[10px] text-red-400">Sil</button>
                        </div>
                    </div>
                    <div class="w-full bg-black/30 rounded-full h-1 overflow-hidden"><div class="bg-blue-500 h-1 rounded-full transition-all duration-300" style="width: ${i.progress || 0}%"></div></div>
                </div>
            `).join('');
        }

        function addToQueue(id) { const item = queue.find(i => i.id === id); if(item) { item.status = 'Sırada'; render(); if(!isProcessing) processNext(); } }
        document.getElementById('drop-zone').onclick = () => document.getElementById('file-input').click();
        document.getElementById('file-input').onchange = (e) => { Array.from(e.target.files).forEach(f => queue.push({ id: Date.now()+Math.random(), file: f, status: 'Bekliyor', progress: 0, blob: null })); render(); };
        function convertAll() { queue.filter(i => i.status === 'Bekliyor').forEach(i => i.status = 'Sırada'); if(!isProcessing) processNext(); render(); }
        function download(id) { const item = queue.find(i => i.id === id); if(item?.blob) { const a = document.createElement('a'); a.href = URL.createObjectURL(item.blob); a.download = item.file.name.replace(/\.[^/.]+$/, "") + ".mp3"; a.click(); } }
        async function downloadAll() { const readyItems = queue.filter(i => i.status === 'Hazır'); for(let i = 0; i < readyItems.length; i++) { download(readyItems[i].id); await new Promise(r => setTimeout(r, 500)); } }
        
        function remove(id) { 
            if(activeItemId === id) { worker.terminate(); worker = createWorker(); isProcessing = false; }
            queue = queue.filter(i => i.id !== id); render(); 
            if(!isProcessing && queue.find(i => i.status === 'Sırada')) processNext();
        }
        
        function clearAll() { 
            worker.terminate(); worker = createWorker(); isProcessing = false; activeItemId = null;
            queue = []; render(); 
        }
    </script>
</body>
</html>
